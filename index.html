<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/DTS-Calc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="ctds-app">
        <header class="ctds-header">
            <span class="ctds-header-title">/DTS-Calc</span>
            <div class="ctds-mode-toggle" aria-label="Mode toggle">
                <span class="ctds-mode-label">Pace</span>
                <div class="ctds-mode-switch-group" role="group">
                    <button class="ctds-mode-btn is-active" id="modeSingle" type="button">Single</button>
                    <button class="ctds-mode-btn" id="modeMulti" type="button">Multi</button>
                </div>
            </div>
        </header>

        <div class="ctds-single-shell" id="singlePaceApp">
            <main class="ctds-main">
                <div class="ctds-field ctds-field--time is-target">
                    <label class="ctds-label" for="timeInput" id="timeLabel">HH:MM:SS</label>
                    <input type="text"
                           class="ctds-value"
                           id="timeInput"
                           placeholder="00:00:00"
                           aria-describedby="timeLabel"
                           aria-disabled="true">
                </div>

                <div class="ctds-field ctds-field--distance is-nontarget">
                    <label class="ctds-label" for="distanceInput" id="distanceLabel">KM</label>
                    <input type="text"
                           class="ctds-value"
                           id="distanceInput"
                           placeholder="00.00"
                           aria-describedby="distanceLabel"
                           inputmode="decimal">
                </div>

                <div class="ctds-field ctds-field--speed is-nontarget">
                    <label class="ctds-label" for="speedInput" id="speedLabel">KM/H</label>
                    <input type="text"
                           class="ctds-value"
                           id="speedInput"
                           placeholder="00.00"
                           aria-describedby="speedLabel"
                           inputmode="decimal">
                </div>

                <div class="ctds-field ctds-field--pace is-nontarget">
                    <label class="ctds-label" for="paceInput" id="paceLabel">MIN/KM</label>
                    <input type="text"
                           class="ctds-value"
                           id="paceInput"
                           placeholder="00:00"
                           aria-describedby="paceLabel"
                           inputmode="numeric">
                </div>
            </main>

            <footer class="ctds-controls">
                <div class="ctds-toggle-row">
                    <button class="ctds-toggle" id="unitToggle" type="button">Metric</button>
                    <button class="ctds-toggle" id="imperialToggle" type="button">Imperial</button>
                </div>

                <div class="ctds-circles">
                    <button class="ctds-circle is-active" id="timeBtn" aria-pressed="true" type="button">Time</button>
                    <button class="ctds-circle" id="distanceBtn" aria-pressed="false" type="button">Distance</button>
                    <button class="ctds-circle" id="speedBtn" aria-pressed="false" type="button">Speed</button>
                </div>

                <div class="ctds-reset">
                    <button class="ctds-reset-btn" id="resetBtn" type="button">
                        <span class="ctds-reset-icon" aria-hidden="true">↺</span>
                        <span class="ctds-reset-text">Reset</span>
                    </button>
                </div>
            </footer>
        </div>

        <div class="ctds-multi-shell" id="multiPaceApp" hidden>
            <main class="ctds-multi-main">
                <div class="ctds-multi-status" id="multiStatusArea" aria-live="polite">
                    <p class="ctds-multi-message ctds-multi-message--error" id="multiError" hidden></p>
                    <p class="ctds-multi-message ctds-multi-message--warning" id="multiWarning" hidden></p>
                </div>

                <section class="ctds-multi-empty" id="multiEmptyState">
                    <button class="ctds-action-btn ctds-action-btn--full" id="uploadGpxBtn" type="button">
                        <span aria-hidden="true">↥</span>
                        <span>Upload .gpx</span>
                    </button>
                    <div class="ctds-multi-hint" id="uploadState">
                        <p>Routes between 5.0km and 45.0km.</p>
                        <p>Segmented into 100m pace blocks.</p>
                    </div>
                </section>

                <section class="ctds-multi-loaded" id="multiLoadedState" hidden>
                    <div class="ctds-multi-panel" id="multiChartPanel">
                        <div class="ctds-multi-chart-region" id="multiChartRegion" aria-label="Elevation segment chart"></div>
                        <div class="ctds-multi-zones" id="multiZones" role="list" aria-label="Pace zones"></div>
                    </div>

                    <div class="ctds-multi-total" id="multiTotalRow">
                        <span class="ctds-multi-total-label">Total Time</span>
                        <span class="ctds-multi-total-value" id="multiTotalTime"></span>
                    </div>
                </section>

                <input id="gpxFileInput" type="file" accept=".gpx,application/gpx+xml" hidden>
            </main>

            <footer class="ctds-multi-footer">
                <div class="ctds-multi-actions" id="multiActionRow">
                    <button class="ctds-action-btn" id="multiUploadBtn" type="button">
                        <span aria-hidden="true">↥</span>
                        <span>Upload .gpx</span>
                    </button>
                    <button class="ctds-action-btn ctds-action-btn--active" id="addZoneBtn" type="button">+ Add Zone</button>
                    <button class="ctds-action-btn" id="deleteZoneBtn" type="button" hidden>Delete</button>
                </div>

                <div class="ctds-reset ctds-reset--multi" id="multiResetRow">
                    <button class="ctds-reset-btn" id="multiReset" type="button">
                        <span class="ctds-reset-icon" aria-hidden="true">↺</span>
                        <span class="ctds-reset-text">Reset</span>
                    </button>
                </div>
            </footer>
        </div>

        <div class="mp-sheet-backdrop" id="mpSheetBackdrop" hidden></div>
        <div class="mp-sheet" id="mpSheet" hidden>
            <div class="mp-sheet-inner">
                <span class="mp-sheet-label" id="mpSheetLabel">Z1 Pace</span>
                <input
                    class="mp-sheet-input"
                    id="mpSheetInput"
                    type="text"
                    inputmode="numeric"
                    placeholder="MM:SS"
                    aria-label="Zone pace" />
                <button class="mp-sheet-confirm" id="mpSheetConfirm" type="button">
                    Confirm
                </button>
            </div>
        </div>

        <div id="ann" role="status" aria-live="polite" class="ctds-announcer"></div>
    </div>

    <script type="module" src="js/calculator.js"></script>
</body>
</html>
